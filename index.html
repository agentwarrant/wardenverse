<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wardenverse - Visual Block Explorer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
    }
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    #header {
      padding: 12px 20px;
      background: rgba(20, 20, 30, 0.9);
      border-bottom: 1px solid rgba(100, 100, 150, 0.3);
      display: flex;
      align-items: center;
      gap: 20px;
      z-index: 100;
    }
    #header h1 {
      font-size: 18px;
      font-weight: 600;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #stats {
      display: flex;
      gap: 20px;
      margin-left: auto;
      font-size: 13px;
    }
    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .stat-value {
      font-weight: 600;
      color: #60a5fa;
    }
    .stat-label {
      font-size: 10px;
      color: #666;
      text-transform: uppercase;
    }
    #canvas-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #main-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #overlay {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(20, 20, 30, 0.85);
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 12px;
      max-width: 300px;
      border: 1px solid rgba(100, 100, 150, 0.2);
    }
    #legend {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(20, 20, 30, 0.85);
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 11px;
      border: 1px solid rgba(100, 100, 150, 0.2);
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .legend-color {
      width: 12px;
      height: 12px;
      border-radius: 2px;
    }
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    #loading h2 {
      font-size: 24px;
      margin-bottom: 10px;
    }
    #loading p {
      color: #666;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(100, 100, 150, 0.3);
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    #performance {
      position: absolute;
      bottom: 20px;
      right: 20px;
      background: rgba(20, 20, 30, 0.85);
      padding: 8px12px;
      border-radius: 8px;
      font-size: 10px;
      color: #666;
      border: 1px solid rgba(100, 100, 150, 0.2);
    }
    #performance .good { color: #34d399; }
    #performance .ok { color: #fbbf24; }
    #performance .bad { color: #ef4444; }
  </style>
</head>
<body>
  <div id="app">
    <div id="header">
      <h1>Wardenverse</h1>
      <div id="stats">
        <div class="stat">
          <span class="stat-value" id="block-height">--</span>
          <span class="stat-label">Block</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="tx-count">--</span>
          <span class="stat-label">TXs</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="tps">--</span>
          <span class="stat-label">TPS</span>
        </div>
      </div>
    </div>
    <div id="canvas-container">
      <canvas id="main-canvas"></canvas>
      <div id="loading">
        <div class="spinner"></div>
        <h2>Connecting to Warden...</h2>
        <p>Initializing the universe...</p>
      </div>
      <div id="legend" style="display: none;">
        <div class="legend-item">
          <div class="legend-color" style="background: linear-gradient(135deg, #fbbf24, #f59e0b);"></div>
          <span>Block (Star)</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background: linear-gradient(135deg, #60a5fa, #3b82f6);"></div>
          <span>Transaction (Comet)</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background: linear-gradient(135deg, #34d399, #10b981);"></div>
          <span>Token Transfer</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background: linear-gradient(135deg, #f472b6, #ec4899);"></div>
          <span>Contract Call</span>
        </div>
        <div style="margin-top: 10px; font-size: 10px; color: #666;">
          Click to add particles
        </div>
      </div>
      <div id="performance">
        <span id="fps">--</span> FPS | <span id="resolution">--</span>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
